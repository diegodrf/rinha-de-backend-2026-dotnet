services:
  webapi:
    image: ghcr.io/diegodrf/rinha-de-backend-2026-dotnet:latest
    environment:
      ConnectionStrings__rinha-db: "Host=postgres-server;Port=5432;Username=postgres;Password=9yZCv2.F}wnE~0{sxj*!Jx;Database=rinha-db"
    expose:
      - "8080"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.15"
          memory: "100M"
    depends_on:
      postgres-server:
        condition: service_healthy
    networks:
      - rinha-network
  
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:80"
    networks:
      - rinha-network
    restart: always
    depends_on:
      webapi:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30M"
  
  postgres-server:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "9yZCv2.F}wnE~0{sxj*!Jx"
      POSTGRES_DB: "postgres"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d rinha-db -c 'SELECT 1 FROM \"AntifraudResults\" LIMIT 1;' || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 15s
    networks:
      - rinha-network
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: "120M"

networks:
  rinha-network:
    driver: "bridge"